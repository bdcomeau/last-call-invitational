<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Button Test</title>
<style>
body { background:#0E1A12; color:#EDE8DC; font-family:Arial,sans-serif; padding:20px; }
.btn { display:block; width:100%; padding:20px; margin:10px 0; background:#D4A843; color:#111;
       border:none; border-radius:8px; font-size:18px; font-weight:bold; }
#result { margin-top:20px; padding:20px; background:#1E2E23; border-radius:8px; font-size:16px; min-height:60px; }
</style>
</head>
<body>
<h2 style="color:#D4A843;">Button Tap Test</h2>
<p>Tap each button — if it works you will see a message below.</p>

<button class="btn" onclick="document.getElementById('result').innerHTML='✅ BUTTON 1 WORKS — ' + new Date().toLocaleTimeString()">Button 1 — onclick</button>

<button class="btn" style="background:#3DB86E;" id="btn2">Button 2 — addEventListener</button>

<a href="#" style="display:block;width:100%;padding:20px;margin:10px 0;background:#5AAEDD;color:#111;border-radius:8px;font-size:18px;font-weight:bold;text-align:center;text-decoration:none;" onclick="document.getElementById('result').innerHTML='✅ LINK WORKS — ' + new Date().toLocaleTimeString();return false;">Link tag — onclick</a>

<div style="display:block;width:100%;padding:20px;margin:10px 0;background:#B07FDE;color:#111;border-radius:8px;font-size:18px;font-weight:bold;text-align:center;cursor:pointer;" onclick="document.getElementById('result').innerHTML='✅ DIV WORKS — ' + new Date().toLocaleTimeString()">DIV tag — onclick</div>

<div id="result">Waiting for tap...</div>

<script>
document.getElementById('btn2').addEventListener('click', function() {
  document.getElementById('result').innerHTML = '✅ BUTTON 2 WORKS — ' + new Date().toLocaleTimeString();
});
</script>
</body>
</html>
